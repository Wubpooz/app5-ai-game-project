plugins {
    id 'java-library'
    id 'application'
    id 'eclipse'
}

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

application {
    mainClass.set("io.ClientJeu")
}

tasks.withType(JavaCompile).configureEach {
    options.release.set(21)
}

jar {
    manifest {
        attributes 'Main-Class': 'io.ClientJeu'
    }
}

// Create a fat (uber) JAR containing dependencies for easy distribution
task fatJar(type: Jar) {
    archiveBaseName = project.name + '-all'
    archiveClassifier = ''
    manifest {
        attributes 'Main-Class': 'io.ClientJeu'
    }
    from { configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) } }
    with jar
}


repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.15.2'
    testImplementation 'junit:junit:4.12'
}

task runDataExport(type: JavaExec) {
    group = 'application'
    description = 'Runs the dataset exporter'
    mainClass = 'model.DataExport'
    classpath = sourceSets.main.runtimeClasspath
}

task runTournament(type: JavaExec) {
    group = 'application'
    description = 'Runs the tournament runner'
    mainClass = 'ranking.TournamentRunner'
    classpath = sourceSets.main.runtimeClasspath
}

task runSimplexTuner(type: JavaExec) {
    group = 'application'
    description = 'Runs the simplex parameter tuner'
    mainClass = 'ranking.SimplexTuner'
    classpath = sourceSets.main.runtimeClasspath
}

task runSpsaTuner(type: JavaExec) {
    group = 'application'
    description = 'Runs the SPSA parameter tuner'
    mainClass = 'ranking.ParameterTuner'
    classpath = sourceSets.main.runtimeClasspath
}


